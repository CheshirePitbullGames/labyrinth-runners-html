name: maze-adventure-game

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-maze_adventure}
      POSTGRES_USER: ${POSTGRES_USER:-maze}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-maze}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-maze} -d ${POSTGRES_DB:-maze_adventure}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile.dev
    restart: unless-stopped
    environment:
      NODE_ENV: development
      HOST: 0.0.0.0
      PORT: 3000
      CLIENT_ORIGIN: http://localhost:${CLIENT_PORT:-5173}
      PUBLIC_API_BASE_URL: http://localhost:${SERVER_PORT:-3000}
      SOCKET_PATH: /socket.io
      DATABASE_URL: postgresql://${POSTGRES_USER:-maze}:${POSTGRES_PASSWORD:-maze}@postgres:5432/${POSTGRES_DB:-maze_adventure}
      REDIS_URL: redis://redis:6379
    volumes:
      - .:/workspace
      - server-root-node-modules:/workspace/node_modules
    command: >
      sh -c "npm install && npm run dev:server"
    ports:
      - "${SERVER_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  client:
    build:
      context: .
      dockerfile: apps/client/Dockerfile.dev
    restart: unless-stopped
    environment:
      NODE_ENV: development
      VITE_API_BASE_URL: http://localhost:${SERVER_PORT:-3000}
      VITE_WS_URL: http://localhost:${SERVER_PORT:-3000}
    volumes:
      - .:/workspace
      - client-root-node-modules:/workspace/node_modules
    command: >
      sh -c "npm install && npm run dev --workspace @maze/client -- --host 0.0.0.0 --port 5173"
    ports:
      - "${CLIENT_PORT:-5173}:5173"
    depends_on:
      server:
        condition: service_started

volumes:
  postgres-data:
  redis-data:
  server-root-node-modules:
  client-root-node-modules:
